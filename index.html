<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Lista de Convidados</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <h1>Gerenciamento de Convidados</h1>
        
        <div class="box">
            <h2>Nomes em Maiúsculas</h2>
            <ul id="lista-maiusculas"></ul>
        </div>

        <div class="box">
            <h2>Estatísticas</h2>
            <p>Nomes que começam com "A": <strong id="contador-a">0</strong></p>
        </div>

        <div class="box">
            <h2>Nomes com mais de 5 letras</h2>
            <ul id="lista-longos"></ul>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
