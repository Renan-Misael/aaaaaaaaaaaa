<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Menu de Convidados</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <h1>Meus Convidados</h1>
        
        <div class="menu">
            <button id="btn-0" class="ativo">Lista VIP</button>
            <button id="btn-1">Lista Família</button>
            <button id="btn-2">Lista Amigos</button>
        </div>
        
        <div id="area-resultados" class="box">
            <h2 id="titulo-lista">Resultados</h2>
            
            <h3>Nomes (Maiúsculas):</h3>
            <ul id="lista-maiusculas"></ul>
            
            <h3>Quantos começam com "A"?</h3>
            <p>Total: <strong id="contador-a">0</strong></p>
            
            <h3>Nomes longos (+ de 5 letras):</h3>
            <ul id="lista-longos"></ul>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
